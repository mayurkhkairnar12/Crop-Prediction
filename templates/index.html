<html>

<head>

<meta charset="UTF-8">
<title>Crop Yield Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}


body{

    min-height:100vh;

    background:
    linear-gradient(120deg,#1b5e20,#66bb6a);

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}



.container{

    width:95%;

    max-width:1000px;

    background:white;

    border-radius:20px;

    padding:35px;

    box-shadow:0 20px 50px rgba(0,0,0,0.3);

}



.header{

    text-align:center;

    margin-bottom:30px;

}


.header h1{

    color:#1b5e20;

    font-size:32px;

}


.header p{

    color:#666;

    margin-top:8px;

}




.form-grid{


    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;


}



.field{

    display:flex;

    flex-direction:column;

}



label{

    font-weight:600;

    margin-bottom:8px;

    color:#333;

}



input,select{

    padding:12px;

    border-radius:10px;

    border:1px solid #ccc;

    font-size:15px;

}



input:focus,
select:focus{

    outline:none;

    border-color:#2e7d32;

    box-shadow:0 0 8px #a5d6a7;

}




button{

    grid-column:1/4;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2e7d32;

    color:white;

    font-size:18px;

    cursor:pointer;

}



button:hover{

    background:#1b5e20;

}




.result{


    margin-top:25px;

    background:#e8f5e9;

    padding:18px;

    border-radius:12px;

    text-align:center;

    color:#1b5e20;

    font-size:18px;

    font-weight:bold;

}





@media(max-width:800px){


.form-grid{

grid-template-columns:1fr;

}


button{

grid-column:1;

}


}


</style>


</head>


<body>



<div class="container">


<div class="header">

<h1>🌾 Crop Yield Prediction</h1>

<p>AI Based Crop Production Estimation System</p>

</div>




<form action="/predict" method="POST">


<div class="form-grid">



<div class="field">

<label>Year</label>

<input 
type="number"
name="Year"
placeholder="Enter Year"
required>

</div>




<div class="field">

<label>Rainfall</label>

<input 
type="number"
step="0.01"
name="rain_fall"
placeholder="Average Rainfall"
required>

</div>





<div class="field">

<label>Pressure</label>

<input 
type="number"
step="0.01"
name="pressure"
placeholder="Pressure"
required>

</div>





<div class="field">

<label>Temperature</label>

<input 
type="number"
step="0.01"
name="avg"
placeholder="Average Temperature"
required>

</div>






<div class="field">

<label>Country</label>


<select name="Area" required>

<option value="">Select Country</option>

<option>Albania</option>
<option>Algeria</option>
<option>Angola</option>
<option>Argentina</option>
<option>Armenia</option>
<option>Australia</option>
<option>Austria</option>
<option>Azerbaijan</option>
<option>Bahamas</option>
<option>Bahrain</option>
<option>Bangladesh</option>
<option>Belarus</option>
<option>Belgium</option>
<option>Botswana</option>
<option>Brazil</option>
<option>Bulgaria</option>
<option>Burkina Faso</option>
<option>Burundi</option>
<option>Cameroon</option>
<option>Canada</option>
<option>Central African Republic</option>
<option>Chile</option>
<option>Colombia</option>
<option>Croatia</option>
<option>Denmark</option>
<option>Dominican Republic</option>
<option>Ecuador</option>
<option>Egypt</option>
<option>El Salvador</option>
<option>Eritrea</option>
<option>Estonia</option>
<option>Finland</option>
<option>France</option>
<option>Germany</option>
<option>Ghana</option>
<option>Greece</option>
<option>Guatemala</option>
<option>Guinea</option>
<option>Guyana</option>
<option>Haiti</option>
<option>Honduras</option>
<option>Hungary</option>
<option>India</option>
<option>Indonesia</option>
<option>Iraq</option>
<option>Ireland</option>
<option>Italy</option>
<option>Jamaica</option>
<option>Japan</option>
<option>Kazakhstan</option>
<option>Kenya</option>
<option>Latvia</option>
<option>Lebanon</option>
<option>Lesotho</option>
<option>Libya</option>
<option>Lithuania</option>
<option>Madagascar</option>
<option>Malawi</option>
<option>Malaysia</option>
<option>Mali</option>
<option>Mauritania</option>
<option>Mauritius</option>
<option>Mexico</option>
<option>Montenegro</option>
<option>Morocco</option>
<option>Mozambique</option>
<option>Namibia</option>
<option>Nepal</option>
<option>Netherlands</option>
<option>New Zealand</option>
<option>Nicaragua</option>
<option>Niger</option>
<option>Norway</option>
<option>Pakistan</option>
<option>Papua New Guinea</option>
<option>Peru</option>
<option>Poland</option>

<option>Qatar</option>
<option>Romania</option>
<option>Rwanda</option>
<option>Saudi Arabia</option>
<option>Senegal</option>
<option>Slovenia</option>
<option>South Africa</option>

<option>Sri Lanka</option>

<option>Uruguay</option>
<option>Zambia</option>
<option>Zimbabwe</option>


</select>


</div>





<div class="field">

<label>Crop</label>


<select name="Item" required>

<option value="">Select Crop</option>

<option>Maize</option>
<option>Potatoes</option>
<option>Rice, paddy</option>
<option>Sorghum</option>
<option>Soybeans</option>
<option>Wheat</option>
<option>Cassava</option>
<option>Sweet potatoes</option>
<option>Plantains and others</option>
<option>Yams</option>

</select>


</div>





<button type="submit">

Predict Yield 🌱

</button>



</div>


</form>





{% if prediction_text %}

<div class="result">

{{ prediction_text }}

</div>

{% endif %}




</div>



</body>

</html>
